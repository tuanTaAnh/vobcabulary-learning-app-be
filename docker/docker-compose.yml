services:
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: german-vocab-backend
    ports:
      - "8000:8000"
    env_file:
      - .env.docker
    volumes:
      - ../app:/app/app
      - ../models:/app/models
      - ../data:/app/data
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload